services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001 --reload
    env_file: ../.env
    volumes:
      - ../app:/app/app
    ports:
      - "127.0.0.1:8001:8001"
    depends_on:
      - redis
    extra_hosts:
      - "host.docker.internal:host-gateway"

  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: arq app.worker.settings.WorkerSettings --watch app
    env_file: ../.env
    volumes:
      - ../app:/app/app
    depends_on:
      - redis
    extra_hosts:
      - "host.docker.internal:host-gateway"

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
